version: "3.9"

services:
  # ── Database ───────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${DB_NAME:-trading_kraken}
      POSTGRES_USER: ${DB_USER:-trader}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - trading
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trading
    restart: unless-stopped

  # ── Trading Bot ────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file: .env
    depends_on:
      - timescaledb
      - redis
    networks:
      - trading
    volumes:
      - bot_logs:/app/logs
    restart: unless-stopped

  # ── Dashboard API ──────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - timescaledb
      - redis
    networks:
      - trading
    restart: unless-stopped

  # ── Nginx Reverse Proxy ────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-active.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - dashboard
    networks:
      - trading
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    networks:
      - trading
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - trading
    restart: unless-stopped

  # ── SSL Certificates ──────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  timescale_data:
  redis_data:
  bot_logs:
  grafana_data:
  certbot_certs:
  certbot_webroot:

networks:
  trading:
    driver: bridge
